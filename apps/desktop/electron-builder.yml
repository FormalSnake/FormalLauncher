appId: com.formallauncher.app
productName: FormalLauncher
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc,.env,.env.*}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
publish:
  provider: github
  owner: FormalSnake
  repo: FormalLauncher
nsis:
  oneClick: true
  perMachine: false
  differentialPackage: true
mac:
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  target:
    - nsis
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: Game
